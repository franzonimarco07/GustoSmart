    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');

        :root {
            --primary: #FF5C00;
            --bg: #F8F9FB;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: #1A1C1E;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        .page {
            display: none;
            min-height: 100vh;
            padding-top: 90px;
            /* 160px è la misura ideale per far finire il tasto esattamente sopra la tua nuova barra ridimensionata */
            padding-bottom: 160px;
        }

            .page.active {
                display: block;
                animation: fadeIn 0.3s ease;
            }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: rgba(248, 249, 251, 0.9);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
            z-index: 2000;
        }

        .round-label {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border: 1.5px solid #F1F5F9;
            transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
        }

        .ingredient-checkbox:checked + .round-label {
            background: var(--primary);
            border-color: var(--primary);
            transform: scale(1.1);
        }

            .ingredient-checkbox:checked + .round-label i {
                color: white;
            }

        .nav-container {
            position: fixed;
            bottom: 20px; /* Più vicina al bordo */
            left: 50%;
            transform: translateX(-50%);
            width: 85%; /* Leggermente più stretta */
            max-width: 380px; /* Ridotta da 450px */
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 28px; /* Arrotondamento più proporzionato */
            border: 1px solid rgba(255,255,255,0.5);
            display: flex;
            justify-content: space-around;
            padding: 10px; /* Ridotto da 15px */
            z-index: 1000;
            box-shadow: 0 15px 30px rgba(0,0,0,0.08);
            transition: transform 0.4s ease;
        }

        .nav-item i {
            font-size: 1.1rem; /* Icone più piccole (da 1.4rem/xl) */
            transition: all 0.3s ease;
        }

        .nav-item span {
            font-size: 9px; /* Testo leggermente più piccolo */
            margin-top: 2px;
        }

        .nav-item.active {
            color: var(--primary);
            transform: translateY(-3px); /* Salto meno accentuato */
        }

            .nav-item.active i {
                font-size: 1.2rem; /* Feedback attivo più discreto */
            }

        .category-pill {
            transition: 0.3s;
            white-space: nowrap;
            border: 1px solid #edf2f7;
        }

            .category-pill.active {
                background: #111 !important;
                color: white !important;
                border-color: #111 !important;
            }

        #settings-page {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 1500;
            display: none;
            padding-top: 100px;
            overflow-y: auto;
        }

            #settings-page.active {
                display: block;
            }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        function renderLogo() {
        const container = document.getElementById('logo-container');
        container.innerHTML = LOGO_URL ? `<img src="${LOGO_URL}" class="h-10">` : `<div class="font-black text-xl tracking-tighter">GUSTOSMART<span class="text-orange-500">PRO</span></div>`;
        }

        function renderIngredienti(lista) {
        const grid = document.getElementById('frigo-grid');
        grid.innerHTML = lista.map(ing => `
        <div class="flex flex-col items-center ing-item" data-name="${ing.n.toLowerCase()}">
        <input type="checkbox" id="f-${ing.id}" value="${ing.id}" class="hidden ingredient-checkbox">
        <label for="f-${ing.id}" class="round-label mb-2"><i class="fas ${ing.i} text-slate-300"></i></label>
        <span class="text-[8px] font-bold text-slate-400 uppercase truncate w-full px-1 text-center">${ing.n}</span>
        </div>`).join('');
        }

        function cercaIngredienti() {
        const query = document.getElementById('ing-search').value.toLowerCase();
        document.querySelectorAll('.ing-item').forEach(item => {
        const name = item.getAttribute('data-name');
        item.style.display = name.includes(query) ? 'flex' : 'none';
        });
        }

        async function caricaRicette() {
        const { data, error } = await sb.from('recipes').select('*');
        if (!error) { tutteLeRicette = data || []; aggiornaUI(); }
        }

        function renderFiltri() {
        // Aggiungi "Torte" alla lista qui sotto
        const categorie = ["Tutti", "Antipasto", "Primo", "Secondo", "Dolce", "Torta"];
    
        document.getElementById('home-category-filters').innerHTML = categorie.map(cat => `
        <button onclick="setCategory('${cat}')" 
                class="category-pill px-6 py-3 rounded-2xl font-bold text-xs bg-white ${filtroCategoriaAttivo === cat ? 'active' : ''}">
            ${cat.toUpperCase()}
        </button>`).join('');
        }

        function setCategory(cat) { filtroCategoriaAttivo = cat; renderFiltri(); aggiornaUI(); }

        function renderCards(recipes, containerId) {
        const container = document.getElementById(containerId);
        if (!recipes.length) { container.innerHTML = `<p class="text-center text-slate-400 py-10 font-bold w-full">Nessun risultato</p>`; return; }
        container.innerHTML = recipes.map(r => `
        <div onclick="apriRicetta('${r.id}')" class="bg-white rounded-[40px] overflow-hidden shadow-sm border border-slate-100 active:scale-[0.98] transition-all">
        <div class="relative h-72">
        <img src="${r.image_url}" class="w-full h-full object-cover">
        <div class="absolute bottom-5 left-5 flex gap-2">
        <div class="bg-white/95 backdrop-blur-md px-4 py-2 rounded-2xl flex items-center gap-2 shadow-sm">
        <i class="fas fa-clock text-orange-500 text-[10px]"></i>
        <span class="text-[10px] font-black">${r.prep_time}</span>
        </div>
        <div class="bg-white/95 backdrop-blur-md px-4 py-2 rounded-2xl flex items-center gap-2 shadow-sm">
        <i class="fas fa-user text-blue-500 text-[10px]"></i>
        <span class="text-[10px] font-black">${r.servings || 2} Pers.</span>
        </div>
        </div>
        </div>
        <div class="p-7">
        <h3 class="text-2xl font-black text-slate-900 leading-tight">${r.title}</h3>
        </div>
        </div>`).join('');
        }

        function apriRicetta(id) {
    const r = tutteLeRicette.find(item => item.id == id);
    if(!r) return;
    
    document.getElementById('recipe-modal').classList.remove('hidden');
    document.getElementById('modal-content').innerHTML = `
        <div class="fixed top-6 left-6 z-50">
            <button onclick="chiudiRicetta()" class="bg-white w-12 h-12 rounded-full flex items-center justify-center text-black shadow-sm border border-slate-100 active:scale-90 transition-all">
                <i class="fa-solid fa-chevron-left text-sm"></i>
            </button>
        </div>
        
        <div class="fixed top-6 right-6 z-50">
            <button onclick="condividiRicetta('${r.title.replace(/'/g, "\\'")}')" class="bg-white w-12 h-12 rounded-full flex items-center justify-center text-black shadow-sm border border-slate-100 active:scale-90 transition-all">
                <i class="fa-solid fa-share-nodes text-sm"></i>
            </button>
        </div>

        <div class="relative h-[400px]">
            <img src="${r.image_url}" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>
            <div class="absolute bottom-10 px-8"><h2 class="text-4xl font-black text-white">${r.title}</h2></div>
        </div>
        
        <div class="px-8 pb-20 pt-10 bg-white rounded-t-[40px] -mt-10 relative z-10">
            <div class="flex gap-4 mb-10">
                <div class="flex-1 bg-slate-50 p-5 rounded-[30px] text-center border border-slate-100">
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">Preparazione</p>
                    <p class="font-black">${r.prep_time}</p>
                </div>
                <div class="flex-1 bg-slate-50 p-5 rounded-[30px] text-center border border-slate-100">
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">Dosi</p>
                    <p class="font-black">${r.servings || 2} Pers.</p>
                </div>
            </div>
            <h3 class="text-xl font-black mb-6">Ingredienti</h3>
            <div class="space-y-3 mb-10">
                ${(r.ingredients || []).map(i => `
                    <div class="bg-slate-50 p-5 rounded-2xl font-bold text-sm flex items-center gap-4 border border-slate-50">
                        <div class="w-2 h-2 bg-orange-500 rounded-full"></div> ${i}
                    </div>
                `).join('')}
            </div>
            <h3 class="text-xl font-black mb-4">Istruzioni</h3>
            <p class="text-slate-500 leading-relaxed whitespace-pre-wrap">${r.description}</p>
        </div>`;
}

        async function condividiRicetta(titolo) {
        const shareData = {
        title: 'GustoSmart Pro',
        text: `Guarda questa ricetta: ${titolo}`,
        url: window.location.href
        };

        try {
        if (navigator.share) {
            await navigator.share(shareData);
        } else {
            // Fallback per browser che non supportano la condivisione nativa
            navigator.clipboard.writeText(`${titolo} - ${window.location.href}`);
            alert("Link copiato negli appunti!");
        }
        } catch (err) {
        console.log('Errore:', err);
        }
    }

    function filtraPerFrigo() {
    // 1. Prendo gli ingredienti che l'utente ha selezionato (es: ['uova'])
    let selezionati = Array.from(document.querySelectorAll('.ingredient-checkbox:checked')).map(cb => cb.value.toLowerCase());
    
    if(selezionati.length === 0) { 
        aggiornaUI(); 
        naviga('home'); 
        return; 
    }

    // 2. Creo una lista estesa di termini di ricerca
    let terminiRicerca = [...selezionati];

    // LOGICA SINONIMI: Se selezioni uova, aggiungo i derivati
    if (selezionati.includes('uova')) {
        terminiRicerca.push('tuorlo', 'tuorli', 'albume', 'albumi', 'uovo');
    }
    
    // Esempio extra: se selezioni farina, cerca anche amidi
    if (selezionati.includes('farina')) {
        terminiRicerca.push('fecola', 'amido', 'maizena');
    }

    // 3. Filtro le ricette
    const filtrate = tutteLeRicette.filter(r => {
        // Unisco tutto il testo della ricetta in una stringa unica
        const contenutoRicetta = (
            r.title + " " + 
            (r.ingredients_simple || []).join(" ") + " " + 
            (r.ingredients || []).join(" ") + " " +
            (r.description || "")
        ).toLowerCase();

        // Controllo se nella ricetta esiste ALMENO uno dei termini della lista estesa
        return terminiRicerca.some(termine => contenutoRicetta.includes(termine));
    });

    // 4. Mostro i risultati
    renderCards(filtrate, 'home-recipes');
    naviga('home');
    window.scrollTo({ top: 0, behavior: 'smooth' });
    }

        function aggiornaUI() {
        const f = tutteLeRicette.filter(r => filtroCategoriaAttivo === "Tutti" || r.category === filtroCategoriaAttivo);
        renderCards(f, 'home-recipes');
        renderCards(tutteLeRicette, 'explore-recipes');
        }

        function filtraRicette() {
        const v = document.getElementById('search-input').value.toLowerCase();
        renderCards(tutteLeRicette.filter(r => r.title.toLowerCase().includes(v)), 'explore-recipes');
        }

        function naviga(p) {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        document.getElementById(p).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('nav-'+p).classList.add('active');
        window.scrollTo(0,0);
        }

        function toggleSettings() {
        const s = document.getElementById('settings-page');
        const isOpen = s.classList.toggle('active');
        document.getElementById('settings-icon').className = isOpen ? 'fa-solid fa-xmark' : 'fa-solid fa-sliders';
        document.getElementById('bottom-nav').style.display = isOpen ? 'none' : 'flex';
        }

        function chiudiRicetta() { document.getElementById('recipe-modal').classList.add('hidden'); }
        window.onload = init;
    </script>
</body>

</html>
